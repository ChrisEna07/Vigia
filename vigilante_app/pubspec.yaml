name: vigilante_app
description: App móvil para registro de accesos - Vigilante
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.2.0

dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^2.8.1
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  go_router: ^14.8.1
  json_annotation: ^4.9.0
  freezed_annotation: ^2.4.4
  intl: ^0.19.0
  google_fonts: ^6.2.1

  # Escaneo y OCR (preparados para activar en paso posterior)
  mobile_scanner: ^6.0.2
  google_mlkit_text_recognition: ^0.13.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.14
  json_serializable: ^6.9.4
  freezed: ^2.5.8
  riverpod_generator: ^2.6.3
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
